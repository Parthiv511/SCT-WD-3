<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Quiz Game Application</title>

    <!-- GOOGLE FONT -->

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= QUIZ CONTAINER ================= -->

    <div class="quiz-container">

        <!-- ================= QUIZ CARD ================= -->

        <div class="quiz-card">

            <!-- TITLE -->

            <h1>
                Quiz Challenge
            </h1>

            <!-- QUESTION COUNT -->

            <div class="question-count">

                Question
                <span id="currentQuestion">
                    1
                </span>

                /
                <span id="totalQuestions">
                    5
                </span>

            </div>

            <!-- ================= PROGRESS BAR ================= -->

            <div class="progress-container">

                <div class="progress-bar" id="progressBar">

                </div>

            </div>

            <!-- ================= TIMER ================= -->

            <div class="timer">

                Time Left:
                <span id="timer">
                    15
                </span>
                s

            </div>

            <!-- QUESTION -->

            <h2 id="question">

                Loading Question...

            </h2>

            <!-- OPTIONS -->

            <div class="options" id="options">

            </div>

            <!-- NEXT BUTTON -->

            <button id="nextBtn">

                Next Question

            </button>

        </div>

        <!-- ================= RESULT CARD ================= -->

        <div class="result-card hidden" id="resultCard">

            <h1>
                Quiz Completed 🎉
            </h1>

            <h2 id="scoreText">

                Your Score: 0 / 5

            </h2>

            <button id="restartBtn">

                Restart Quiz

            </button>

        </div>

    </div>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
